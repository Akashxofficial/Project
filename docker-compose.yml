version: '3.8'

services:
  tanios:
    build: .
    container_name: tanios_app
    ports:
      - "5173:5173"
      - "3001:3001"
    volumes:
      - .:/app
      - /app/node_modules
    env_file:
      - .env
    environment:
      - NODE_ENV=development
      - CHOKIDAR_USEPOLLING=true # Ensures hot-reload triggers correctly across windows host directories
